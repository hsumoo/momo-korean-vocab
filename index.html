<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>韓文單字學習進度</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .subtext {
      color: #6b7280;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .card h2 {
      margin-top: 0;
      font-size: 20px;
      margin-bottom: 16px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #6366f1;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    .primary-btn {
      background: #111827;
      color: white;
    }

    .primary-btn:hover {
      opacity: 0.92;
    }

    .export-btn {
      background: white;
      border: 1px solid #d1d5db;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin-bottom: 20px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 8px;
      color: #6b7280;
    }

    .progress-bar {
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      width: 0%;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-box {
      background: #f3f4f6;
      border-radius: 14px;
      padding: 14px;
    }

    .stat-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
    }

    .list-card {
      margin-top: 20px;
    }

    .list-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .word-list {
      display: grid;
      gap: 12px;
    }

    .word-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
    }

    .word-content {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .field-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .field-value {
      font-size: 15px;
      word-break: break-word;
    }

    .korean {
      font-size: 22px;
      font-weight: bold;
    }

    .status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin-right: 8px;
    }

    .done {
      background: #dcfce7;
      color: #166534;
    }

    .learning {
      background: #fef3c7;
      color: #92400e;
    }

    .delete-btn {
      background: #fee2e2;
      color: #991b1b;
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #6b7280;
      border: 1px dashed #d1d5db;
      border-radius: 16px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .form-grid,
      .word-content {
        grid-template-columns: 1fr;
      }

      .list-top,
      .top-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .word-item {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div>
        <h1>韓文單字學習進度</h1>
        <div class="subtext">記錄你學過的韓文單字，包含韓文、發音、英文、中文。</div>
      </div>
      <button class="export-btn" onclick="exportData()">匯出資料</button>
    </div>

    <div class="grid">
      <div class="card">
        <h2>新增單字</h2>
        <div class="form-grid">
          <input id="korean" placeholder="韓文，例如：학교" />
          <input id="pronunciation" placeholder="發音，例如：hakgyo" />
          <input id="english" placeholder="英文，例如：school" />
          <input id="chinese" placeholder="中文，例如：學校" />
        </div>
        <div class="actions">
          <button class="primary-btn" onclick="addWord()">新增到單字庫</button>
        </div>
      </div>

      <div class="card">
        <h2>學習進度</h2>
        <div class="progress-row">
          <span>已學會</span>
          <span id="progressText">0 / 50</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="stats">
          <div class="stat-box">
            <div class="stat-label">總單字數</div>
            <div class="stat-value" id="totalCount">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">已學會</div>
            <div class="stat-value" id="learnedCount">0</div>
          </div>
        </div>

        <div class="field-label">學習目標</div>
        <input id="goalInput" type="number" min="1" value="50" onchange="updateGoal()" />
      </div>
    </div>

    <div class="card list-card">
      <div class="list-top">
        <h2 style="margin: 0;">單字列表</h2>
        <input id="searchInput" placeholder="搜尋韓文 / 發音 / 英文 / 中文" oninput="renderWords()" />
      </div>
      <div id="wordList" class="word-list"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "korean_vocab_words";
    const GOAL_KEY = "korean_vocab_goal";

    let words = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
      {
        id: Date.now(),
        korean: "안녕하세요",
        pronunciation: "annyeonghaseyo",
        english: "hello",
        chinese: "你好",
        learned: true
      },
      {
        id: Date.now() + 1,
        korean: "감사합니다",
        pronunciation: "gamsahamnida",
        english: "thank you",
        chinese: "謝謝",
        learned: false
      }
    ];

    let goal = Number(localStorage.getItem(GOAL_KEY)) || 50;
    document.getElementById("goalInput").value = goal;

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
      localStorage.setItem(GOAL_KEY, goal);
    }

    function addWord() {
      const korean = document.getElementById("korean").value.trim();
      const pronunciation = document.getElementById("pronunciation").value.trim();
      const english = document.getElementById("english").value.trim();
      const chinese = document.getElementById("chinese").value.trim();

      if (!korean || !chinese) {
        alert("請至少填寫韓文和中文。");
        return;
      }

      words.unshift({
        id: Date.now(),
        korean,
        pronunciation,
        english,
        chinese,
        learned: false
      });

      document.getElementById("korean").value = "";
      document.getElementById("pronunciation").value = "";
      document.getElementById("english").value = "";
      document.getElementById("chinese").value = "";

      saveData();
      renderWords();
    }

    function toggleLearned(id) {
      words = words.map(word =>
        word.id === id ? { ...word, learned: !word.learned } : word
      );
      saveData();
      renderWords();
    }

    function deleteWord(id) {
      words = words.filter(word => word.id !== id);
      saveData();
      renderWords();
    }

    function updateGoal() {
      const value = Number(document.getElementById("goalInput").value);
      goal = value > 0 ? value : 1;
      saveData();
      renderWords();
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(words, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "korean-vocab-progress.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function renderWords() {
      const search = document.getElementById("searchInput").value.toLowerCase().trim();
      const list = document.getElementById("wordList");

      const filtered = words.filter(word =>
        [word.korean, word.pronunciation, word.english, word.chinese]
          .filter(Boolean)
          .some(value => value.toLowerCase().includes(search))
      );

      const learnedCount = words.filter(word => word.learned).length;
      const progress = Math.min((learnedCount / goal) * 100, 100);

      document.getElementById("totalCount").textContent = words.length;
      document.getElementById("learnedCount").textContent = learnedCount;
      document.getElementById("progressText").textContent = `${learnedCount} / ${goal}`;
      document.getElementById("progressFill").style.width = `${progress}%`;

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty">目前沒有符合的單字，試著新增一個吧。</div>`;
        return;
      }

      list.innerHTML = filtered.map(word => `
        <div class="word-item">
          <div>
            <input type="checkbox" ${word.learned ? "checked" : ""} onchange="toggleLearned(${word.id})">
          </div>

          <div class="word-content">
            <div>
              <div class="field-label">韓文</div>
              <div class="field-value korean">${word.korean || "—"}</div>
            </div>
            <div>
              <div class="field-label">發音</div>
              <div class="field-value">${word.pronunciation || "—"}</div>
            </div>
            <div>
              <div class="field-label">英文</div>
              <div class="field-value">${word.english || "—"}</div>
            </div>
            <div>
              <div class="field-label">中文</div>
              <div class="field-value">${word.chinese || "—"}</div>
            </div>
          </div>

          <div>
            <span class="status ${word.learned ? "done" : "learning"}">
              ${word.learned ? "已學會" : "學習中"}
            </span>
            <button class="delete-btn" onclick="deleteWord(${word.id})">刪除</button>
          </div>
        </div>
      `).join("");
    }

    renderWords();
  </script>
</body>
</html>
